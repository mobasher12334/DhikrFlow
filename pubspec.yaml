name: dhikrflow
description: A high-performance Islamic Dhikr counter with voice intelligence.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Voice Recognition (Vosk)
  vosk_flutter: any
  path_provider: ^2.1.2
  permission_handler: ^10.2.0
  archive: ^3.4.9
  http: ^0.13.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Fonts
  google_fonts: ^6.2.1

  # Audio Feedback
  audioplayers: ^6.1.0

  # Haptics
  vibration: ^2.0.0

  # Animations
  flutter_animate: ^4.5.0

  # Date formatting (used in history entries)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
